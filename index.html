<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Baris di bawah ini wajib ada agar responsif di HP -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voting FIS</title>
  <link rel="icon" type="image/png" href="https://ils.my.id/images-vooting-fis/icon_kpum_compact.png">
  
  <style>
    /* Menghilangkan margin bawaan browser agar iframe benar-benar penuh */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Mencegah scrollbar ganda */
      background-color: #ffffff;
    }
    
    /* Pengaturan gaya iframe agar responsif dan mengikuti ukuran layar HP */
    .responsive-iframe {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbyiFirKPiMfTujtvHa0qp7FzR3n90r7BalBZ_Y6ux0OWKeR7aDUtR18lq6uFnMiorYW3A/exec"
    class="responsive-iframe"
    allowfullscreen="true">
  </iframe>

</body>
</html>
